# OmegaRelay Provider configuration.
#
# Fields:
#   url           — WebSocket URL of the relay server
#   psk           — Pre-shared key (must be at least 16 chars; same as on the server)
#   device_id     — Identifier for this device (must match the server's device list)
#   tls_insecure  — Skip TLS cert validation (true only for self-signed dev servers)

url = wss://your-relay.example.com:8443/
psk = REPLACE-ME-with-a-long-random-secret-at-least-16-chars
device_id = device-b-1
tls_insecure = false
