# Optional nginx config snippet to terminate TLS in front of omega-relay.
#
# Put OmegaRelay behind nginx if you already have a TLS-terminating reverse
# proxy and want to keep it as the single TLS-bearing component.
#
# 1. Run install.sh with OMEGA_NO_TLS=1 OMEGA_BIND_ADDR=127.0.0.1:18443
# 2. Add this server block to nginx.
# 3. systemctl reload nginx

upstream omega_relay {
    server 127.0.0.1:18443;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name relay.example.com;   # <-- edit me

    ssl_certificate     /etc/letsencrypt/live/relay.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.example.com/privkey.pem;

    # Modern TLS only.
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # WebSocket upgrade.
    location / {
        proxy_pass http://omega_relay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;

        # Long-lived idle WS connections; the daemon pings every 25s.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
