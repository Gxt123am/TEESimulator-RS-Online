# OmegaRelay Consumer — relay client configuration
#
# Place at: /data/adb/tricky_store/omega-relay.conf
# (this file is omega-relay.example.conf — copy/rename it.)
#
# Lines starting with '#' are comments. Values may be quoted.
# All four keys are read; missing 'url' / 'psk' / 'device_id'
# disables the relay engine entirely (Mode.RELAY then no-ops and
# Keystore2Interceptor falls back to local PATCH).

# Public address of the omega-server. ws:// is fine on a trusted
# LAN; production should be wss:// behind a Let's Encrypt cert.
url = wss://relay.example.com:8443/

# Pre-shared key. Must match the server's [auth] psk and be at
# least 16 characters. Treat it like a password.
psk = REPLACE_WITH_SHARED_SECRET_AT_LEAST_16_CHARS

# Stable identifier for this consumer. Surfaced in server logs and
# can be used by the server to gate which providers a consumer can
# be paired with. Free-form, recommend hostname or short slug.
device_id = device-a-1

# Skip TLS certificate verification. ONLY for local development
# against a self-signed VPS; never enable in production.
tls_insecure = false
